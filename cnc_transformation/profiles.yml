cnc_transformation:
  outputs:
    dev:
      type: bigquery
      method: oauth-token
      project: "{{ env_var('STREAMLIT_GCP_PROJECT_ID') }}"
      dataset: raw_factory_data
      threads: 1
      # Uses the live authenticated session token passed from python!
      token: "{{ env_var('DBT_BQ_TOKEN') }}"
  target: dev