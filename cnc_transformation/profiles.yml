cnc_transformation:
  outputs:
    dev:
      type: bigquery
      method: oauth
      # dbt will now look for an environment variable named STREAMLIT_GCP_PROJECT_ID
      project: "{{ env_var('STREAMLIT_GCP_PROJECT_ID') }}"
      dataset: raw_factory_data
      threads: 1
      # dbt will now look for an environment variable named DBT_BQ_TOKEN
      token: "{{ env_var('DBT_BQ_TOKEN') }}"
  target: dev